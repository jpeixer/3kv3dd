<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3kv3dd — Visualização 3D</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f1117; color: #e8eaed; font-family: "Segoe UI", system-ui, sans-serif; }
    #canvas-wrap { width: 100%; height: 100%; }
    #canvas { display: block; width: 100%; height: 100%; }
    .overlay {
      position: fixed; inset: 0; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    header {
      pointer-events: auto;
      padding: 1rem 1.25rem;
      background: linear-gradient(180deg, rgba(15,17,23,.92), transparent);
    }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: .02em; }
    header p { margin-top: .35rem; font-size: .875rem; color: #9aa0a6; max-width: 42rem; }
    footer {
      pointer-events: auto;
      padding: .75rem 1.25rem;
      background: linear-gradient(0deg, rgba(15,17,23,.92), transparent);
      font-size: .8rem; color: #9aa0a6;
    }
    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 1rem 1.5rem; border-radius: .5rem;
      background: rgba(30,34,44,.95); border: 1px solid #3c4048;
      font-size: .95rem;
    }
    #loading.hidden { display: none; }
    #error-banner {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      max-width: 90vw; padding: .75rem 1rem; border-radius: .5rem;
      background: rgba(90, 20, 20, .95); border: 1px solid #c5221f;
      font-size: .875rem; color: #f28b82;
    }
    #error-banner.hidden { display: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div class="overlay">
    <header>
      <h1>3kv3dd — Painel de Controle Industrial</h1>
      <p>Arraste para girar · Scroll para zoom · Botão direito para mover. Modelo exportado da cena Unity SampleScene.</p>
    </header>
    <footer>Unity 6 · URP · Three.js GLB</footer>
  </div>
  <div id="loading">Carregando modelo 3D…</div>
  <div id="error-banner" class="hidden"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const MODEL_PATH = './assets/scene.glb';
    const loadingEl = document.getElementById('loading');
    const errorBanner = document.getElementById('error-banner');
    const canvas = document.getElementById('canvas');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1117);
    scene.fog = new THREE.Fog(0x0f1117, 40, 120);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
    camera.position.set(8, 12, 14);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 8, 0);
    controls.enablePan = true;

    const amb = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(amb);
    const key = new THREE.DirectionalLight(0xffffff, 1.1);
    key.position.set(10, 20, 12);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
    fill.position.set(-8, 6, -6);
    scene.add(fill);

    const grid = new THREE.GridHelper(40, 40, 0x2a2f3a, 0x1a1e26);
    grid.position.y = -0.01;
    scene.add(grid);

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.remove('hidden');
    }

    function fitCamera(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = maxDim * 1.8;
      camera.position.set(center.x + dist * 0.6, center.y + dist * 0.4, center.z + dist * 0.8);
      controls.target.copy(center);
      controls.minDistance = maxDim * 0.3;
      controls.maxDistance = maxDim * 6;
      controls.update();
    }

    function loadGlb(url) {
      return new Promise((resolve, reject) => {
        const loader = new GLTFLoader();
        loader.load(url, (gltf) => resolve(gltf), undefined, reject);
      });
    }

    function resize() {
      const wrap = document.getElementById('canvas-wrap');
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    async function init() {
      resize();
      window.addEventListener('resize', resize);

      try {
        const gltf = await loadGlb(MODEL_PATH);
        const model = gltf.scene;
        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(model);
        fitCamera(model);
      } catch (err) {
        console.error(err);
        showError('Falha ao carregar o modelo GLB. Verifique se o arquivo está publicado no repositório.');
      } finally {
        loadingEl.classList.add('hidden');
        animate();
      }
    }

    init();
  </script>
</body>
</html>
